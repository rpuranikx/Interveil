services:
  interveil:
    build: .
    ports:
      - "3000:3000"
    command: ["node", "dist/cli.js", "serve", "--db", "/app/traces/interveil.db"]
    volumes:
      - ./traces:/app/traces
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
